<!DOCTYPE html>
<html>
<head>
<title>Pro E-Commerce Store</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<style>
body {font-family: Arial; margin:0; background:#f4f4f4;}
nav {background:#111; color:white; padding:15px; display:flex; justify-content:space-between;}
.container {display:flex; gap:20px; padding:20px;}

.panel {width:300px; background:white; padding:15px; border-radius:10px;}
.products {flex:1; display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px;}

.card {background:white; padding:10px; border-radius:10px;}
button {width:100%; padding:8px; margin-top:5px; cursor:pointer;}

.cart {
 position:fixed; right:10px; top:70px; width:250px;
 background:white; padding:10px; border-radius:10px;
}
</style>
</head>

<body>

<nav>
<h2>🔥 Pro Store</h2>
<div>🛒 <span id="count">0</span></div>
</nav>

<div class="container">

<!-- ADMIN PANEL -->
<div class="panel">

<h3>Admin Login</h3>
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">
<button onclick="login()">Login</button>

<hr>

<div id="adminPanel" style="display:none;">
<h3>Add Product</h3>
<input id="name" placeholder="Product name">
<input id="price" placeholder="Price">
<button onclick="addProduct()">Upload</button>

<hr>

<h3>Orders</h3>
<div id="orders"></div>
</div>

</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

</div>

<!-- CART -->
<div class="cart">
<h3>Cart</h3>
<div id="cart"></div>

<input id="discount" placeholder="discount code">
<button onclick="applyDiscount()">Apply</button>

<p>Total: ₦<span id="total">0</span></p>
<button onclick="checkout()">Checkout</button>
</div>

<script>

/* 🔥 FIREBASE CONFIG (REPLACE THIS) */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let cart = [];
let discount = 0;

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
  .then(()=>{
    document.getElementById("adminPanel").style.display = "block";
    loadOrders();
  })
  .catch(()=>alert("Login failed"));
}

/* ADD PRODUCT */
function addProduct(){
  db.collection("products").add({
    name: name.value,
    price: parseInt(price.value)
  });
}

/* LOAD PRODUCTS */
db.collection("products").onSnapshot(snap=>{
  let box = document.getElementById("products");
  box.innerHTML = "";

  snap.forEach(doc=>{
    let p = doc.data();

    box.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>₦${p.price}</p>
        <button onclick="addToCart('${p.name}',${p.price})">Add</button>
      </div>
    `;
  });
});
